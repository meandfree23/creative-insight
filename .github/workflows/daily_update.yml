name: Daily Creative Insight Update

on:
  schedule:
    # Runs at 23:00 UTC everyday (08:00 AM KST next day)
    - cron: '0 23 * * *'
  workflow_dispatch: # Allows manual trigger from the GitHub Actions tab

jobs:
  update-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Needed to push commits
      
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run data fetch script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python fetch_ideas.py

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/daily/*.json data/manifest.json
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update daily insight data"
          git push
