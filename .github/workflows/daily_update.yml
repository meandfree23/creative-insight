name: Daily Creative Insight Update

on:
  schedule:
    - cron: '0 23 * * *' # 8:00 AM KST
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Target Date (YYYY-MM-DD)'
        required: false
        default: ''

jobs:
  update-data:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run script
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: |
          python fetch_ideas.py ${{ github.event.inputs.target_date }}

      - name: Commit and push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if ! git diff --quiet || ! git diff --staged --quiet; then
            git commit -m "Automated daily update"
            for i in {1..10}; do
              git pull --rebase origin main && git push origin main && break || sleep $((RANDOM % 10 + 5))
            done
          fi
